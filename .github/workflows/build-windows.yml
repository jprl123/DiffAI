# Gera o instalável/portable Windows (DiffAI.exe) via PyInstaller.
# Dispare manualmente: Actions → Build Windows → Run workflow
name: Build Windows

on:
  workflow_dispatch:
    inputs:
      unlimited:
        description: "Build de teste ilimitado (sem trial/limites)"
        type: boolean
        default: false
      upload_release:
        description: "Anexar o ZIP à release GitHub tag informada (vazio = só artifact)"
        type: string
        default: ""

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install "pyinstaller>=6.0" pillow

      - name: Ensure Windows icon (.ico)
        shell: pwsh
        run: |
          if (-not (Test-Path "assets\branding\diffai.ico")) {
            python -c @"
          from PIL import Image
          img = Image.open('assets/branding/diffai-icon.png').convert('RGBA')
          sizes = [(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)]
          imgs = [img.resize(s, Image.Resampling.LANCZOS) for s in sizes]
          imgs[-1].save('assets/branding/diffai.ico', format='ICO',
                        sizes=[(i.width, i.height) for i in imgs])
          print('generated diffai.ico')
          "@
          }

      - name: Build desktop (Windows)
        shell: pwsh
        run: |
          if ("${{ inputs.unlimited }}" -eq "true") {
            .\scripts\build_desktop_windows.ps1 -Unlimited
          } else {
            .\scripts\build_desktop_windows.ps1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: diffAI-windows
          path: |
            dist/diffAI-windows.zip
            dist/diffAI-windows-test-unlimited.zip
          if-no-files-found: error
          retention-days: 14

      - name: Attach to GitHub Release
        if: ${{ inputs.upload_release != '' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ inputs.upload_release }}"
          $zip = if (Test-Path "dist\diffAI-windows-test-unlimited.zip") {
            "dist\diffAI-windows-test-unlimited.zip"
          } else {
            "dist\diffAI-windows.zip"
          }
          gh release upload $tag $zip --clobber
          Write-Host "Uploaded $zip to release $tag"
